<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cyber Snake 👾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0a14; color: white; text-align: center; }
        .navbar { background-color: #161224; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #7b2cbf; }
        .navbar a { color: #e0aaff; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
        .score-box { background-color: #3c096c; padding: 0.4rem 1.2rem; border-radius: 20px; border: 1px solid #7b2cbf; font-weight: bold; color: #fff; text-shadow: 0 0 5px #ff007f; }
        h2 { margin: 2rem 0 0.5rem; color: #e0aaff; text-shadow: 0 0 10px #7b2cbf; font-size: 2.2rem; }
        p { margin-bottom: 1.5rem; color: #b3a7d4; }
        
        .container { position: relative; width: 400px; height: 400px; margin: 0 auto; }
        canvas { background: #110d24; border: 4px solid #7b2cbf; border-radius: 12px; box-shadow: 0 0 25px rgba(123, 44, 191, 0.5); }
        
        /* Nova Tela de Game Over */
        .game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 10, 20, 0.9); border-radius: 12px; flex-direction: column; align-items: center; justify-content: center; }
        .game-over-screen h3 { color: #ff007f; font-size: 24px; margin-bottom: 10px; text-shadow: 0 0 10px #ff007f; }
        .game-over-screen p { color: #fff; font-size: 18px; margin-bottom: 20px; }
        .retry-btn { background: linear-gradient(90deg, #7b2cbf, #b5179e); color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .retry-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(181, 23, 158, 0.6); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/">⬅️ Sair da Arena</a>
        <div class="score-box">SCORE: <span id="score">0</span></div>
    </nav>

    <h2>Cyber Snake</h2>
    <p>Use as setas do teclado para mover.</p>

    <div class="container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-over-screen" id="gameOverScreen">
            <h3>SISTEMA CORROMPIDO</h3>
            <p>Pontuação Final: <span id="finalScore">0</span></p>
            <button class="retry-btn" onclick="restartGame()">Tentar Novamente</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let count = 0;
        let score = 0;
        let gameActive = true;

        let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: 320, y: 320 };

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function loop() {
            if (!gameActive) return;
            requestAnimationFrame(loop);
            if (++count < 6) return; 
            count = 0;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            snake.x += snake.dx;
            snake.y += snake.dy;

            if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) endGame();

            snake.cells.unshift({ x: snake.x, y: snake.y });
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            ctx.fillStyle = '#ff007f';
            ctx.fillRect(apple.x + 2, apple.y + 2, grid - 4, grid - 4);

            snake.cells.forEach(function (cell, index) {
                ctx.fillStyle = index === 0 ? '#e0aaff' : '#7b2cbf';
                ctx.fillRect(cell.x + 1, cell.y + 1, grid - 2, grid - 2);

                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score += 10;
                    document.getElementById('score').innerText = score;
                    apple.x = getRandomInt(0, 20) * grid;
                    apple.y = getRandomInt(0, 20) * grid;
                }
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) endGame();
                }
            });
        }

        function endGame() {
            gameActive = false;
            document.getElementById("finalScore").innerText = score;
            document.getElementById("gameOverScreen").style.display = "flex";
        }

        function restartGame() {
            snake.x = 160; snake.y = 160; snake.cells = []; snake.maxCells = 4;
            snake.dx = grid; snake.dy = 0; score = 0;
            document.getElementById('score').innerText = score;
            apple.x = getRandomInt(0, 20) * grid; apple.y = getRandomInt(0, 20) * grid;
            document.getElementById("gameOverScreen").style.display = "none";
            gameActive = true;
            requestAnimationFrame(loop);
        }

        document.addEventListener('keydown', function (e) {
            if (!gameActive) return;
            if (e.which === 37 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
            else if (e.which === 38 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
            else if (e.which === 39 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
            else if (e.which === 40 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
        });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
